name: Tutoriel Tests Symfony E-commerce

on: 
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]

# Supprime l'avertissement sur Node.js 20
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup PHP 8.4  
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: sqlite3, mbstring, xml, ctype, iconv # Extensions courantes pour Symfony

    - name: Cache Composer
      uses: actions/cache@v4
      with:
        path: vendor
        key: composer-${{ hashFiles('**/composer.lock') }}

    # --- ÉTAPE AJOUTÉE POUR CORRIGER L'ERREUR 255 ---
    - name: Create .env for CI
      run: |
        echo "APP_ENV=test" > .env
        echo "APP_SECRET=abcdef1234567890" >> .env
        echo "DATABASE_URL=sqlite:///%kernel.project_dir%/var/data.db" >> .env
    # -----------------------------------------------

    - name: Install dependencies
      run: composer install --prefer-dist --no-progress

    - name: Run PHPUnit tests
      run: |
        vendor/bin/phpunit --colors=always